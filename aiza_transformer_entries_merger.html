<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebEngage Flow Data Merger (Multi-Format Fix)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans text-slate-800">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-900 mb-2">Data Entries Merger v3</h1>
            <p class="text-slate-600 font-medium text-sm">Fix: Corrected data loss for dates 13-31 (Mixed Date Formats)</p>
        </header>

        <div class="mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <label class="block text-sm font-bold text-slate-700 mb-2">Step 1: Journey Name to ID Mapping</label>
            <textarea id="mappingData" class="w-full h-32 p-4 text-sm bg-slate-50 border border-slate-300 rounded-xl font-mono" placeholder="KL_ABC_En	4l32e5d"></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <label class="block text-sm font-bold text-slate-700 mb-2">Step 2: Performance Data (Main Sheet)</label>
                <textarea id="mainData" class="w-full h-64 p-4 text-sm bg-slate-50 border border-slate-300 rounded-xl" placeholder="Paste data containing period_start and flow_name..."></textarea>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <label class="block text-sm font-bold text-slate-700 mb-2">Step 3: Entries Data (Horizontal Sheet)</label>
                <textarea id="entriesData" class="w-full h-64 p-4 text-sm bg-slate-50 border border-slate-300 rounded-xl" placeholder="Paste horizontal sheet with dates 01-Jan, 13-Jan, etc..."></textarea>
            </div>
        </div>

        <div class="flex flex-col items-center gap-4">
            <button onclick="processData()" class="px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg transition-transform active:scale-95">
                Process and Download Updated CSV
            </button>
            <div id="status" class="hidden text-sm font-medium p-3 rounded-lg"></div>
        </div>
    </div>

    <script>
        function smartParse(text) {
            if (!text || !text.trim()) return [];
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;
            const delimiter = text.includes('\t') ? '\t' : ',';

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];
                if (inQuotes) {
                    if (char === '"' && nextChar === '"') { currentField += '"'; i++; }
                    else if (char === '"') { inQuotes = false; }
                    else { currentField += char; }
                } else {
                    if (char === '"') { inQuotes = true; }
                    else if (char === delimiter) { currentRow.push(currentField.trim()); currentField = ''; }
                    else if (char === '\r' || char === '\n') {
                        currentRow.push(currentField.trim());
                        if (currentRow.length > 0 && currentRow.some(f => f !== '')) rows.push(currentRow);
                        currentRow = []; currentField = '';
                        if (char === '\r' && nextChar === '\n') i++;
                    } else { currentField += char; }
                }
            }
            if (currentRow.length > 0 || currentField !== '') {
                currentRow.push(currentField.trim());
                rows.push(currentRow);
            }
            return rows;
        }

        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        function tryStandardize(dateStr, format) {
            if (!dateStr) return null;
            const parts = dateStr.split(/[-/]/);
            if (parts.length < 2) return null;

            let day, monthIdx;
            
            // Already in DD-MMM format
            if (isNaN(parts[1])) {
                day = parseInt(parts[0]);
                return `${day < 10 ? '0' + day : day}-${parts[1].substring(0, 3)}`;
            }

            // Numeric logic
            if (format === "MD") {
                monthIdx = parseInt(parts[0]) - 1;
                day = parseInt(parts[1]);
            } else {
                day = parseInt(parts[0]);
                monthIdx = parseInt(parts[1]) - 1;
            }

            if (monthIdx < 0 || monthIdx > 11 || day < 1 || day > 31) return null;
            return `${day < 10 ? '0' + day : day}-${months[monthIdx]}`;
        }

        function processData() {
            const mapTxt = document.getElementById('mappingData').value;
            const mainTxt = document.getElementById('mainData').value;
            const entriesTxt = document.getElementById('entriesData').value;

            try {
                const mapRows = smartParse(mapTxt);
                const JOURNEY_MAP = {};
                mapRows.forEach(r => { if (r.length >= 2) JOURNEY_MAP[r[0]] = r[1]; });

                const mainRows = smartParse(mainTxt);
                const entryRows = smartParse(entriesTxt);

                if (mainRows.length < 1 || entryRows.length < 1) {
                    showStatus("Error: Please paste data in all boxes.", "bg-red-50 text-red-600");
                    return;
                }

                const mainHeader = mainRows[0];
                const entryHeader = entryRows[0];
                const flowIdx = mainHeader.findIndex(h => h.toLowerCase().includes('flow_name'));
                const dateIdx = mainHeader.findIndex(h => h.toLowerCase().includes('period_start'));
                const entriesColIdx = mainHeader.findIndex(h => h.toLowerCase().includes('entries'));
                const idColIdx = entryHeader.findIndex(h => h.toLowerCase().includes('journey id'));

                // 1. Build Entries Lookup
                const entriesLookup = {};
                const entryDateKeys = entryHeader.map(h => tryStandardize(h, "DM"));

                for (let i = 1; i < entryRows.length; i++) {
                    const row = entryRows[i];
                    const jid = row[idColIdx];
                    if (!jid) continue;
                    entriesLookup[jid] = {};
                    row.forEach((val, colIdx) => {
                        const dKey = entryDateKeys[colIdx];
                        if (dKey) entriesLookup[jid][dKey] = val;
                    });
                }

                // 2. Merge with Dual-Format Check
                const resultRows = [mainHeader];
                let count = 0;

                for (let i = 1; i < mainRows.length; i++) {
                    const row = [...mainRows[i]];
                    const flowName = row[flowIdx];
                    const dateRaw = row[dateIdx];
                    const jid = JOURNEY_MAP[flowName];
                    
                    if (jid && entriesLookup[jid]) {
                        // TRY BOTH FORMATS (Handles Mixed Excel Dates)
                        const key1 = tryStandardize(dateRaw, "DM"); // Try 13-01
                        const key2 = tryStandardize(dateRaw, "MD"); // Try 01-13
                        
                        const val = (key1 && entriesLookup[jid][key1] !== undefined) ? entriesLookup[jid][key1] : 
                                    (key2 && entriesLookup[jid][key2] !== undefined) ? entriesLookup[jid][key2] : undefined;

                        if (val !== undefined) {
                            row[entriesColIdx] = val;
                            count++;
                        }
                    }
                    resultRows.push(row);
                }

                const csvContent = resultRows.map(r => r.map(c => `"${c.replace(/"/g, '""')}"`).join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `merged_performance_report.csv`;
                link.click();

                showStatus(`Success! Merged ${count} rows across all dates.`, "bg-green-50 text-green-700");
            } catch (err) {
                console.error(err);
                showStatus("Error processing data. Check console.", "bg-red-50 text-red-600");
            }
        }

        function showStatus(msg, classes) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = msg;
            statusDiv.className = `mt-4 text-sm font-medium p-3 rounded-lg ${classes}`;
            statusDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
